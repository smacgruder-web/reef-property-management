<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        
        .asymmetric-overlay {
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
        }

        @keyframes soft-pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.95; }
        }
        .pulse-cta {
            animation: soft-pulse 3s infinite ease-in-out;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body text-on-surface selection:bg-primary-container selection:text-on-primary-container">
<!-- Top Navigation Anchor -->
<header class="fixed top-0 w-full z-50 bg-white/70 backdrop-blur-md flex justify-between items-center px-6 py-4 w-full">
<div class="text-lg font-black text-teal-700 tracking-tighter font-headline">
            Property Portfolio
        </div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-teal-600">close</span>
<button class="font-manrope font-bold tracking-tight text-on-surface hover:opacity-80 transition-opacity active:scale-95 duration-150">Skip</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="relative min-h-screen w-full flex flex-col items-center justify-center overflow-hidden">
<!-- Full-Screen High-Impact Background -->
<div class="absolute inset-0 z-0">
<img alt="Luxury coastal architecture with turquoise ocean view" class="w-full h-full object-cover" data-alt="stunning architectural luxury villa on a rocky mediterranean cliff overlooking a turquoise ocean with soft evening sunlight and glass balconies" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBG6Zmsj977FVWJjJjOi1qJFaNqsGQaqE5pOEXxNbDVoeoQg1B8PlMFvHI5K4gkGI4aQrutdhYuDCdZpK0cY9K4qZwQXHxx7ORkYgXXbZH1Jf3axNH_XwsSuWBgAyyJ0yyWWJdRyLqbO13wrnsri0rfoCDHWF9L1e2aYyQRTXyzNchuA6MjTS3A-vKI8dBiyXDOu3GQCG1374rqVNYfTjA56ACsOVWU2RTCtx4GR_wtWOzY9RJrEnp_4GA3SKZKZx_7kbKIVLvAE4L4"/>
<div class="absolute inset-0 bg-gradient-to-t from-on-surface/80 via-transparent to-on-surface/20"></div>
</div>
<!-- Editorial Content Layer -->
<div class="relative z-10 w-full max-w-6xl px-8 flex flex-col items-center text-center">
<div class="mb-4">
<span class="font-headline font-bold uppercase tracking-[0.4em] text-primary-container text-xs bg-on-surface/30 backdrop-blur-md px-4 py-1.5 rounded-full">
                    Exclusive Access
                </span>
</div>
<h1 class="font-headline font-extrabold text-5xl md:text-8xl text-white tracking-tight leading-[1.1] max-w-4xl mb-8">
                REEF PROPERTY: <span class="block text-primary-container italic font-medium">The Future of Coastal Living</span>
</h1>
<div class="mt-12">
<button class="pulse-cta group relative inline-flex items-center justify-center px-12 py-6 overflow-hidden font-headline font-bold tracking-widest text-white transition-all duration-300 bg-gradient-to-br from-primary to-primary-container rounded-xl shadow-2xl shadow-primary/40 hover:shadow-primary/60">
<span class="relative flex items-center gap-3 text-lg uppercase">
                        Touch to Explore
                        <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</span>
</button>
</div>
</div>
<!-- Asymmetric Decorative Element -->
<div class="absolute bottom-24 right-0 w-1/3 h-64 bg-primary/10 backdrop-blur-2xl asymmetric-overlay hidden md:block"></div>
<!-- Vertical Info Strip -->
<div class="absolute left-8 top-1/2 -translate-y-1/2 hidden lg:flex flex-col gap-12 items-center">
<div class="h-24 w-[1px] bg-white/20"></div>
<p class="rotate-90 origin-center whitespace-nowrap font-headline text-[10px] uppercase tracking-[0.5em] text-white/50">ESTABLISHED MMXXIV</p>
<div class="h-24 w-[1px] bg-white/20"></div>
</div>
</main>
<!-- Progress Indicator & Navigation Shell -->
<footer class="fixed bottom-0 left-0 w-full rounded-t-[2rem] z-50 bg-white/80 backdrop-blur-2xl tonal-shift-from-surface-container-low shadow-[0_-20px_40px_rgba(21,27,45,0.04)]">
<div class="fixed bottom-0 w-full flex justify-around items-center px-8 pb-8 pt-4">
<!-- Previous Button (Inactive) -->
<div class="flex flex-col items-center justify-center text-slate-400 p-4 hover:text-teal-500 transition-colors">
<span class="material-symbols-outlined text-2xl" data-icon="arrow_back">arrow_back</span>
<span class="font-manrope uppercase tracking-widest text-[10px] font-bold mt-1">Previous</span>
</div>
<!-- Progress Step Navigation (Active Hub) -->
<div class="flex flex-col items-center justify-center bg-teal-600 text-white rounded-full h-16 w-16 -mt-8 shadow-lg shadow-teal-500/30 active:scale-90 duration-200 ease-in-out">
<span class="material-symbols-outlined text-2xl" data-icon="horizontal_rule">horizontal_rule</span>
<span class="font-manrope uppercase tracking-widest text-[10px] font-bold">Progress</span>
</div>
<!-- Next Button (Navigable) -->
<div class="flex flex-col items-center justify-center text-slate-400 p-4 hover:text-teal-500 transition-colors">
<span class="material-symbols-outlined text-2xl" data-icon="arrow_forward">arrow_forward</span>
<span class="font-manrope uppercase tracking-widest text-[10px] font-bold mt-1">Next</span>
</div>
</div>
<!-- Subtle 4-Step Progress Bar -->
<div class="absolute bottom-2 left-1/2 -translate-x-1/2 flex gap-3 pb-2">
<div class="h-1 w-8 rounded-full bg-primary shadow-sm shadow-primary/40"></div>
<div class="h-1 w-8 rounded-full bg-surface-container-highest"></div>
<div class="h-1 w-8 rounded-full bg-surface-container-highest"></div>
<div class="h-1 w-8 rounded-full bg-surface-container-highest"></div>
</div>
</footer>
