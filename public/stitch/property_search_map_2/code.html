  const buttonMappings = {
    'view-radar': '/owner/radar',
    'billing-link': '/resident/billing',
    'maintenance-link': '/resident/maintenance',
    'search-link': '/guest/search',
    'booking-link': '/guest/book/dates',
    'payment-link': '/resident/methods',
  };
  Object.keys(buttonMappings).forEach(id => {
    const button = document.getElementById(id);
    if (button) {
      button.addEventListener('click', function(e) {
        e.preventDefault();
        window.parent.postMessage({ path: buttonMappings[id] }, '*');
      });
    }
  });
 document.addEventListener('DOMContentLoaded', function() {
   document.querySelectorAll('[data-nav]').forEach(el => {
     el.addEventListener('click', function(e) {
       const path = this.getAttribute('data-nav');
       if (path) {
         window.parent.postMessage({ path }, '*');
       }
     });
   });
 });
 </script>
